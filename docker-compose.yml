version: "3.7"

services:
  app-nginx:
    image: nginx:alpine
    # container_name: "app-nginx"
    ports:
      - 3080:80
    volumes:
      - ./:/current:z
      - ./.docker/routing/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./.docker/routing/fastcgi_params:/etc/nginx/fastcgi_params:ro,z
      - ./.docker/routing/conf.d/:/etc/nginx/conf.d:ro,z
    networks:
      - app-network
    depends_on:
      - app-fpm

  app-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    image: ogorbunov/php:7.3-fpm-alpine
    # container_name: "app-fpm"
    working_dir: /current
    volumes:
      - ./:/current:z
      - ./.docker/php/php-fpm.conf:/usr/local/etc/php-fpm.conf:ro,z
    networks:
      - app-network
    environment:
      APP_ENV: local
      APP_DEBUG: 1
      APP_URL: http://localhost:3080
      APP_SCHEME: http
      APP_KEY: "base64:46UPFHEBEGaa9CBU4SQbNd5N0BZAxW5gmDB0e12kcRk="
      DB_CONNECTION: mysql
      DB_HOST: app-db
      DB_PORT: 3306
      DB_USERNAME: emergency
      DB_PASSWORD: emergency
      DB_DATABASE: emergency
      BROADCAST_DRIVER: redis
      REDIS_HOST: app-redis
      REDIS_PORT: 6379
      ELASTICSEARCH_HOST: http://app-elasticsearch
    tty: true
    depends_on:
      - app-composer-vendors
    expose:
      - "9000"
      - "9001"

  app-db:
    image: mysql:8.0
    # container_name: "app-db"
    ports:
      - 33306:3306
    volumes:
      - ./database/dumps/report_cache_structure.sql:/docker-entrypoint-initdb.d/02-report-cache-structure.sql:ro,z
      - app-db-data:/var/lib/mysql
      - ./:/current:z
    networks:
      - app-network
    environment:
      MYSQL_USER: emergency
      MYSQL_PASSWORD: emergency
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emergency
      MYSQL_ROOT_HOST: "%"
    command:
      - "--log_bin_trust_function_creators=1"

  app-queue:
    # container_name: "app-queue"
    image: ogorbunov/php:7.3-cli-alpine
    volumes:
      - ./:/current:z
    networks:
      - app-network
    environment:
      APP_ENV: local
      APP_DEBUG: 1
      APP_URL: http://localhost:3080
      APP_SCHEME: http
      APP_KEY: "base64:46UPFHEBEGaa9CBU4SQbNd5N0BZAxW5gmDB0e12kcRk="
      DB_CONNECTION: mysql
      DB_HOST: app-db
      DB_PORT: 3306
      DB_USERNAME: emergency
      DB_PASSWORD: emergency
      DB_DATABASE: emergency
      BROADCAST_DRIVER: redis
      REDIS_HOST: app-redis
      REDIS_PORT: 6379
    command: sh -lc 'while [ ! -f /current/vendor/autoload.php ]; do sleep 2; done; php /current/artisan queue:work'
    depends_on:
      - app-composer-vendors
    restart: unless-stopped

  app-redis:
    # container_name: "app-redis"
    image: redis:latest
    networks:
      - app-network

  app-broadcast:
    # container_name: "app-broadcast"
    image: node:10
    networks:
      - app-network
    volumes:
      - ./echo-server:/app:z
    ports:
      - 6001:6001
    working_dir: /app
    command: sh ./start.sh
    restart: unless-stopped

  #  app-elasticsearch:
  #    container_name: "app-elasticsearch"
  #    image: elasticsearch:5.6
  #    networks:
  #      - app-network

  # service containers
  app-composer-vendors:
    # container_name: "app-composer-vendors"
    image: composer:1
    volumes:
      - ./:/app:z
    command: composer install --ignore-platform-reqs --no-interaction
    networks:
      - app-network

