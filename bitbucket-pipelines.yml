pipelines:
  branches:
    production:
    - step:
        caches:
        - composer
        - vendor
        name: Build PHP part
        image: php:7.2
        script:
        - echo "Starting php build"
        - export COMPOSER_ALLOW_SUPERUSER=1
        - apt-get update && apt-get install -y unzip
        - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
        - composer global require hirak/prestissimo
        - composer install --ignore-platform-reqs --no-suggest --no-progress
    - step:
        caches:
        - node
        - public
        name: Build Laravel Mix
        image: node:10.9
        script:
        - echo "Starting mix build"
        - npm install
        - npm run prod
    - step:
        caches:
        - vendor
        - public
        name: Deploying to server
        image: php:7.2
        deployment: staging
        script:
        - echo "Deployment started"
        - curl -LO https://deployer.org/deployer.phar
        - mv deployer.phar /usr/local/bin/dep
        - chmod +x /usr/local/bin/dep
        - dep deploy

definitions:
  caches:
    vendor: vendor/**
    public: public/**
